name: CI

on:
  pull_request:
    branches:
      - main
      - '[0-9]+.[0-9]+.[0-9]+'
  push:
    branches:
      - main
      - '[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build, test, coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build, test, and enforce coverage (mvn verify -Phandoff)
        # -Phandoff activates the strict JaCoCo gate (>=80% line, >=70% branch,
        # measured on logic only -- entities/models/exceptions are excluded).
        # Testcontainers-backed integration tests need Docker, which is
        # preinstalled on GitHub-hosted ubuntu runners.
        run: mvn -f backend/pom.xml -pl service,application,external-services -am verify -Phandoff -B

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: backend/*/target/site/jacoco/
          retention-days: 14

  frontend:
    name: Frontend typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify generated OpenAPI client is up to date
        working-directory: frontend
        run: |
          npm run generate:api
          git diff --exit-code -- src/shared/api/generated || {
            echo "::error::frontend/src/shared/api/generated is out of date with the OpenAPI spec. Run 'npm run generate:api' and commit the result.";
            exit 1;
          }

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
