openapi: 3.0.3
info:
  title: AI Onboarding Platform API
  version: 1.0.0
  description: Backend API for AI Onboarding & Training platform
servers:
  - url: /api/v1
    description: V1 base path (documentation only)
tags:
  - name: auth
  - name: users
  - name: permissions
  - name: admin
  - name: teams
  - name: groups
  - name: grades
  - name: learning
  - name: files
  - name: materials
  - name: lessons
  - name: roadmaps
  - name: team-progress
  - name: youtube
paths:
  /api/v1/auth/me:
    get:
      summary: Get current user
      description: Returns the authenticated Clerk user profile derived from the JWT.
      tags: [ auth ]
      operationId: getCurrentUser
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
  /api/v1/users/me:
    get:
      summary: Get my profile
      description: Returns the signed-in user's profile including role and avatar settings.
      tags: [ users ]
      operationId: getMyProfile
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserProfileV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
    patch:
      summary: Update my profile
      description: Updates the signed-in user's display name, position, and avatar settings.
      tags: [ users ]
      operationId: updateMyProfile
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        description: Request payload for the updateMyProfile.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserProfileV1' } } } }
        '400': { $ref: '#/components/responses/BadRequestV1' }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
  /api/v1/users/me/avatar:
    post:
      summary: Upload my avatar
      description: Uploads a profile avatar image and returns its storage key.
      tags: [ users ]
      operationId: uploadMyAvatar
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        description: Request payload for the uploadMyAvatar.
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/AvatarUploadFormV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AvatarUploadResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
  /api/v1/users/{id}/grade:
    patch:
      summary: Update user grade
      description: Sets or clears a user's grade. An admin may edit any user; a Team Lead may edit only users who are members of a group they lead. Re-evaluates standing group roadmap assignments so the user is enrolled into any assignment their new grade now matches, without removing existing enrollments.
      tags: [ users ]
      operationId: updateUserGrade
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the updateUserGrade.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserGradeRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateUserGradeResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/permissions:
    get:
      summary: Get current-user permission snapshot
      description: Returns the effective and override permissions for only the authenticated caller. Constant-size and constant-query-cost regardless of organization size — used by every authenticated shell load for sidebar/route gating. See getPermissionManagementSnapshot for the paged Admin/Team Lead management view.
      tags: [ permissions ]
      operationId: getPermissionSnapshot
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CurrentUserPermissionsResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
    put:
      summary: Set permission overrides
      description: Applies per-user permission overrides for a managed team member or team lead.
      tags: [ permissions ]
      operationId: setPermissionOverrides
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        description: Request payload for the setPermissionOverrides.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetPermissionOverridesRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SetPermissionOverridesResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/permissions/management:
    get:
      summary: Get permission management snapshot
      description: Returns effective and override permissions for every user the caller may manage (Admin sees the whole workspace, Team Lead sees their own team) for the Admin/Team Permissions management screens. Not used for bootstrap/sidebar gating — see getPermissionSnapshot for that.
      tags: [ permissions ]
      operationId: getPermissionManagementSnapshot
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PermissionSnapshotResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
  /api/v1/admin/users:
    get:
      summary: List all users for admin role management
      description: Returns a page of users in the workspace with their current role, for the Admin role-assignment view.
      tags: [ admin ]
      operationId: listAdminUsers
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - name: search
          in: query
          required: false
          description: Case-insensitive search matched against the user's name and email.
          schema: { type: string, maxLength: 200 }
        - name: role
          in: query
          required: false
          description: Restricts results to users with this role.
          schema: { $ref: '#/components/schemas/UserRoleCodeV1' }
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema: { type: integer, format: int32, minimum: 0, default: 0 }
        - name: size
          in: query
          required: false
          description: Maximum number of users returned in one response.
          schema: { type: integer, format: int32, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AdminUsersListResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
  /api/v1/admin/users/stats:
    get:
      summary: Get admin user stats
      description: Returns workspace-wide user/admin/team-lead counts for the Admin page stats row, independent of the current search/filter/page.
      tags: [ admin ]
      operationId: getAdminUserStats
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AdminUserStatsResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
  /api/v1/admin/users/{id}/role:
    patch:
      summary: Assign user role
      description: Sets a user's role to Admin, Team Lead, or User. Admin only. Existing group leadership and membership records are left untouched; access checks re-evaluate the user's role on every request.
      tags: [ admin ]
      operationId: assignUserRole
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the assignUserRole.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignUserRoleRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserProfileV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/admin/team-leads:
    get:
      summary: Get team lead admin view
      description: Lists team leads, their teams, and assignable users for admin role management.
      tags: [ admin ]
      operationId: getTeamLeadAdminView
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TeamLeadAdminViewV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
    post:
      summary: Promote team lead
      description: Promotes an existing user to the team lead role by email address.
      tags: [ admin ]
      operationId: promoteTeamLead
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        description: Request payload for the promoteTeamLead.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamLeadEmailRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserProfileV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
    delete:
      summary: Demote team lead
      description: Demotes a team lead back to member by email address.
      tags: [ admin ]
      operationId: demoteTeamLead
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        description: Request payload for the demoteTeamLead.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamLeadEmailRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserProfileV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/teams:
    get:
      summary: List teams
      description: Returns teams visible to the caller along with assignable users and permission flags.
      tags: [ teams ]
      operationId: listTeams
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - name: teamsPage
          in: query
          required: false
          description: Zero-based page index for visible teams.
          schema: { type: integer, format: int32, minimum: 0, default: 0 }
        - name: teamsSize
          in: query
          required: false
          description: Maximum number of teams returned in one response.
          schema: { type: integer, format: int32, minimum: 1, maximum: 100, default: 20 }
        - name: teamsQuery
          in: query
          required: false
          description: Case-insensitive search by team lead name or email.
          schema: { type: string, maxLength: 200 }
        - name: usersPage
          in: query
          required: false
          description: Zero-based page index for assignable users.
          schema: { type: integer, format: int32, minimum: 0, default: 0 }
        - name: usersSize
          in: query
          required: false
          description: Maximum number of assignable users returned in one response.
          schema: { type: integer, format: int32, minimum: 1, maximum: 100, default: 20 }
        - name: usersQuery
          in: query
          required: false
          description: Case-insensitive search by user name or email.
          schema: { type: string, maxLength: 200 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TeamsResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
  /api/v1/teams/{leadId}/members:
    post:
      summary: Add team member
      description: Adds a member to the team led by the specified team lead.
      tags: [ teams ]
      operationId: addTeamMember
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: leadId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the addTeamMember.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddTeamMemberRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AddTeamMemberResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
    delete:
      summary: Remove team member
      description: Removes a member from a team using email or member reference in the body.
      tags: [ teams ]
      operationId: removeTeamMember
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: leadId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the removeTeamMember.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RemoveTeamMemberRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/teams/{leadId}/members/{memberId}:
    delete:
      summary: Remove team member by id
      description: Removes a member from a team using the member user id path parameter.
      tags: [ teams ]
      operationId: removeTeamMemberById
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: leadId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: memberId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/groups:
    get:
      summary: List groups
      description: Returns groups visible to the caller. Admins see every group; a Team Lead sees only groups they lead. Matches against the group name and its leads' name/email.
      tags: [ groups ]
      operationId: listGroups
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - name: search
          in: query
          required: false
          description: Case-insensitive search matched against the group name and lead name/email.
          schema: { type: string, maxLength: 200 }
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema: { type: integer, format: int32, minimum: 0, default: 0 }
        - name: size
          in: query
          required: false
          description: Maximum number of groups returned in one response.
          schema: { type: integer, format: int32, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GroupsListResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
    post:
      summary: Create group
      description: Creates a new group. Admin only; the name must be explicitly provided and is never auto-generated from a lead's name.
      tags: [ groups ]
      operationId: createGroup
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        description: Request payload for the createGroup.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGroupRequestV1' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/GroupResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
  /api/v1/groups/stats:
    get:
      summary: Get group organization stats
      description: Returns aggregate team/member/lead counts scoped like GET /groups — Admins see workspace-wide totals, a Team Lead sees totals for only the groups they lead.
      tags: [ groups ]
      operationId: getGroupOrgStats
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GroupOrgStatsResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
  /api/v1/groups/{id}:
    get:
      summary: Get group
      description: Returns group detail (name, description, leads). Members are paged separately through GET /groups/{id}/members.
      tags: [ groups ]
      operationId: getGroup
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GroupResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
    put:
      summary: Update group
      description: Renames/updates a group. Admins may update any group; a Team Lead may update only groups they lead. Renaming changes display only — assignments, membership, and progress are untouched.
      tags: [ groups ]
      operationId: updateGroup
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the updateGroup.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateGroupRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GroupResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
    delete:
      summary: Delete group
      description: Deletes a group. Admin only.
      tags: [ groups ]
      operationId: deleteGroup
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/groups/{id}/members:
    get:
      summary: List group members
      description: Returns one page of a group's members, with their current grade, optionally filtered by a case-insensitive name/email search. Members are always paged so a large group never loads its entire roster at once.
      tags: [ groups ]
      operationId: listGroupMembers
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - name: search
          in: query
          required: false
          description: Case-insensitive search matched against member name and email.
          schema: { type: string, maxLength: 200 }
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema: { type: integer, format: int32, minimum: 0, default: 0 }
        - name: size
          in: query
          required: false
          description: Maximum number of members returned in one response.
          schema: { type: integer, format: int32, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GroupMembersListResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
    post:
      summary: Add group member
      description: Adds a member to a group. Admin only. Enrolls the new member into every standing group roadmap assignment their grade matches.
      tags: [ groups ]
      operationId: addGroupMember
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the addGroupMember.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddGroupMemberRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AddGroupMemberResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/groups/{id}/members/{userId}:
    delete:
      summary: Remove group member
      description: Removes a member from a group. Admin only. Existing enrollments and progress are left untouched.
      tags: [ groups ]
      operationId: removeGroupMember
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/groups/{id}/roadmap-assignments:
    get:
      summary: List a group's roadmap assignments
      description: Lists the roadmaps standing-assigned to a group. Caller must be able to manage the group.
      tags: [ groups ]
      operationId: listGroupRoadmapAssignments
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RoadmapGroupAssignmentsListResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/groups/{id}/candidate-users:
    get:
      summary: List group candidate users
      description: Returns one page of users eligible to be added to a group, excluding whoever already holds that role in the group. Admin only, since only an Admin can add members or leads.
      tags: [ groups ]
      operationId: listGroupCandidateUsers
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - name: forLeads
          in: query
          required: false
          description: When true, searches lead candidates (admin/team lead role, excluding current leads) instead of member candidates.
          schema: { type: boolean, default: false }
        - name: search
          in: query
          required: false
          description: Case-insensitive search matched against candidate name and email.
          schema: { type: string, maxLength: 200 }
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema: { type: integer, format: int32, minimum: 0, default: 0 }
        - name: size
          in: query
          required: false
          description: Maximum number of candidates returned in one response.
          schema: { type: integer, format: int32, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GroupCandidateUsersListResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/groups/{id}/leads:
    post:
      summary: Add group lead
      description: Assigns a user as an additional lead of a group. Admin only; the user must already hold the Team Lead or Admin role.
      tags: [ groups ]
      operationId: addGroupLead
      security: [ { bearerAuth: [ ] } ]
      parameters:
