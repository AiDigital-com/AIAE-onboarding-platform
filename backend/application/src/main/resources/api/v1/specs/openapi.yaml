        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/roadmaps/{id}/group-assignments:
    get:
      summary: List roadmap group assignments
      description: Lists the groups a roadmap is standing-assigned to, restricted to groups the caller can manage.
      tags: [ roadmaps ]
      operationId: listRoadmapGroupAssignments
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RoadmapGroupAssignmentsListResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
    post:
      summary: Assign roadmap to group
      description: Creates or updates the standing assignment of a roadmap to a group, replacing any existing grade filter, and enrolls every currently matching group member.
      tags: [ roadmaps ]
      operationId: assignRoadmapToGroup
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the assignRoadmapToGroup.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignRoadmapToGroupRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RoadmapGroupAssignmentResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/roadmaps/{id}/group-assignments/preview:
    post:
      summary: Preview roadmap group assignment
      description: Previews how many current group members a grade filter would match, without creating an assignment or enrolling anyone.
      tags: [ roadmaps ]
      operationId: previewRoadmapGroupAssignment
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        description: Request payload for the previewRoadmapGroupAssignment.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoadmapGroupAssignmentPreviewRequestV1' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RoadmapGroupAssignmentPreviewResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/roadmaps/{id}/group-assignments/{groupId}:
    delete:
      summary: Unassign roadmap from group
      description: Removes a roadmap's standing assignment to a group. Existing member enrollments and progress are left untouched.
      tags: [ roadmaps ]
      operationId: unassignRoadmapFromGroup
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: groupId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
        '404': { $ref: '#/components/responses/NotFoundV1' }
  /api/v1/team-progress/dashboard:
    get:
      summary: Get team dashboard
      description: Returns aggregated team learning progress and activity metrics.
      tags: [ team-progress ]
      operationId: getTeamDashboardData
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - name: period
          description: Period used by the operation.
          in: query
          required: false
          schema:
            allOf:
              - $ref: '#/components/schemas/DashboardPeriodV1'
            default: month
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TeamDashboardResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
        '403': { $ref: '#/components/responses/ForbiddenV1' }
  /api/v1/youtube/oembed:
    get:
      summary: Get YouTube oEmbed metadata
      description: Fetches public YouTube oEmbed metadata for a video URL.
      tags: [ youtube ]
      operationId: getYoutubeOembed
      security: [ { bearerAuth: [ ] } ]
      parameters:
        - { name: url, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/YoutubeOembedResponseV1' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedV1' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    UnauthorizedV1:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorV1' }
    ForbiddenV1:
      description: Authenticated but lacking permission
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorV1' }
    NotFoundV1:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorV1' }
    BadRequestV1:
      description: Malformed request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorV1' }
    ConflictV1:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorV1' }
  schemas:
    PageInfoV1:
      description: Pagination metadata attached to a paged list response.
      type: object
      additionalProperties: false
      required: [ page, size, totalElements, totalPages, hasNext, hasPrevious ]
      properties:
        page:
          description: Zero-based index of the page returned in this response.
          type: integer
          format: int32
        size:
          description: Maximum number of items requested per page.
          type: integer
          format: int32
        totalElements:
          description: Total number of items matching the query across all pages.
          type: integer
          format: int64
        totalPages:
          description: Total number of pages available for the query.
          type: integer
          format: int32
        hasNext:
          description: Whether a page after this one exists.
          type: boolean
        hasPrevious:
          description: Whether a page before this one exists.
          type: boolean
    CountResponseV1:
      description: Bounded count-only payload for a search filter, without fetching or paginating the matching rows — used for tab-count display independent of which tab's full list is active.
      type: object
      additionalProperties: false
      required: [ totalElements ]
      properties:
        totalElements:
          description: Total number of items matching the filter.
          type: integer
          format: int64
    SortDirectionV1:
      description: Sort direction applied to a list query's sort field.
      type: string
      enum: [ asc, desc ]
    MaterialSortFieldV1:
      description: Sortable field for material list queries.
      type: string
      enum: [ createdAt, updatedAt, title, usageCount ]
    LessonSortFieldV1:
      description: Sortable field for lesson list queries.
      type: string
      enum: [ createdAt, updatedAt, title ]
    RoadmapSortFieldV1:
      description: Sortable field for roadmap list queries.
      type: string
      enum: [ createdAt, updatedAt, title ]
    SearchMaterialsV1:
      description: Material search, filter, sort, and pagination criteria.
      type: object
      additionalProperties: false
      properties:
        page:
          description: Zero-based page number to return.
          type: integer
          format: int32
          minimum: 0
          default: 0
        size:
          description: Maximum number of materials to return per page.
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
        sort:
          description: Field used to sort the material list.
          allOf:
            - $ref: '#/components/schemas/MaterialSortFieldV1'
          default: createdAt
        direction:
          description: Sort direction applied to the sort field.
          allOf:
            - $ref: '#/components/schemas/SortDirectionV1'
          default: desc
        query:
          description: Free-text search matched against material title, description, body text, creator name, and tags.
          type: string
        tags:
          description: Restricts results to materials tagged with every one of the given values.
          type: array
          items: { type: string }
        createdByUserId:
          description: Restricts results to materials created by this internal user id.
          type: integer
          format: int64
        hasAttachments:
          description: Restricts results to materials that have (true) or do not have (false) file attachments.
          type: boolean
        hasYoutube:
          description: Restricts results to materials that have (true) or do not have (false) YouTube links.
          type: boolean
        hasLinks:
          description: Restricts results to materials that have (true) or do not have (false) web links.
          type: boolean
    SearchLessonsV1:
      description: Lesson search, filter, sort, and pagination criteria.
      type: object
      additionalProperties: false
      properties:
        page:
          description: Zero-based page number to return.
          type: integer
          format: int32
          minimum: 0
          default: 0
        size:
          description: Maximum number of lessons to return per page.
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
        sort:
          description: Field used to sort the lesson list.
          allOf:
            - $ref: '#/components/schemas/LessonSortFieldV1'
          default: createdAt
        direction:
          description: Sort direction applied to the sort field.
          allOf:
            - $ref: '#/components/schemas/SortDirectionV1'
          default: desc
        query:
          description: Free-text search matched against lesson title and tags.
          type: string
        tags:
          description: Restricts results to lessons tagged with every one of the given values.
          type: array
          items: { type: string }
        status:
          description: Restricts results to lessons in this generation lifecycle status.
          allOf:
            - $ref: '#/components/schemas/LessonGenerationStatusV1'
        publicationStatus:
          description: Restricts results to lessons in this publication visibility state.
          allOf:
            - $ref: '#/components/schemas/LessonVisibilityV1'
        createdByUserId:
          description: Restricts results to lessons created by this internal user id.
          type: integer
          format: int64
        assignedToMe:
          description: When true, restricts results to lessons the current viewer is enrolled in.
          type: boolean
        readyOnly:
          description: When true, restricts results to lessons whose generation status is ready.
          type: boolean
        activityType:
          description: Restricts results to lessons that have at least one activity of this type.
          allOf:
            - $ref: '#/components/schemas/LessonActivityTypeV1'
        hasActivities:
          description: Restricts results to lessons that have (true) or do not have (false) any activities.
          type: boolean
    SearchRoadmapsV1:
      description: Roadmap search, filter, sort, and pagination criteria.
      type: object
      additionalProperties: false
      properties:
        page:
          description: Zero-based page number to return.
          type: integer
          format: int32
          minimum: 0
          default: 0
        size:
          description: Maximum number of roadmaps to return per page.
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
        sort:
          description: Field used to sort the roadmap list.
          allOf:
            - $ref: '#/components/schemas/RoadmapSortFieldV1'
          default: createdAt
        direction:
          description: Sort direction applied to the sort field.
          allOf:
            - $ref: '#/components/schemas/SortDirectionV1'
          default: desc
        query:
          description: Free-text search matched against roadmap title, description, creator name, and tags.
          type: string
        tags:
          description: Restricts results to roadmaps tagged with every one of the given values.
          type: array
          items: { type: string }
        createdByUserId:
          description: Restricts results to roadmaps created by this internal user id.
          type: integer
          format: int64
        assignedToMe:
          description: When true, restricts results to roadmaps the current viewer is enrolled in.
          type: boolean
    UserRoleCodeV1:
      description: User role code.
      type: string
      enum: [ admin, teamlead, member ]
    DashboardPeriodV1:
      description: Dashboard time period filter.
      type: string
      enum: [ week, month, quarter ]
    MaterialAssetKindV1:
      description: Material attachment asset kind.
      type: string
      enum: [ file, image ]
    MaterialTypeV1:
      description: Material or lesson asset type discriminator.
      type: string
      enum: [ link, youtube, image, file, video ]
    MaterialInputTypeV1:
      description: Lesson asset input type when adding an asset.
      type: string
      enum: [ url, link, youtube, image, file, video ]
    PreparationStatusV1:
      description: Activity preparation or progress status.
      type: string
      enum: [ not_started, in_progress, completed, failed ]
    LessonActivityTypeV1:
      description: Lesson activity type discriminator.
      type: string
      enum: [ quiz, flashcards ]
    LessonGenerationStatusV1:
      description: Lesson generation lifecycle status.
      type: string
      enum: [ draft, generating, ready, failed ]
    LessonGenerationStatusResponseV1:
      description: Bounded status-only payload for lightweight polling while a lesson is generating, without the full lesson detail (content, activities, enrollment).
      type: object
      additionalProperties: false
      required: [ status ]
      properties:
        status:
          description: Status for Lesson Generation Status Response.
          allOf:
            - $ref: '#/components/schemas/LessonGenerationStatusV1'
    LessonVisibilityV1:
      description: Lesson publication visibility state.
      type: string
      enum: [ published, private, archived ]
    LessonContentFormatV1:
      description: Lesson content storage format.
      type: string
      enum: [ markdown ]
    LessonRevisionKindV1:
      description: Scope of an AI lesson revision.
      type: string
      enum: [ targeted, substantial, near-complete ]
    LessonPublishActionV1:
      description: Publish or archive lifecycle action for a lesson.
      type: string
      enum: [ publish, archive, restore ]
    LessonCreationModeV1:
      description: Versioned lesson creation mode. 'generate' runs AI generation from prepared materials; 'create-manual' persists pre-authored HTML directly.
      type: string
      enum: [ generate, create-manual ]
    ChatRoleV1:
      description: Chat message author role.
      type: string
      enum: [ user, assistant ]
    LessonAssistantPresetV1:
      description: Assistant response mode requested by the learner. Missing preset means regular.
      type: string
      enum: [ regular, small_portions ]
    TeacherVideoProviderV1:
      description: Teacher video generation provider.
      type: string
      enum: [ heygen ]
    ProgressStatusV1:
      description: Team member learning progress status on the dashboard.
      type: string
      enum: [ done, in-progress, not-started ]
    ActivityCompletionModeV1:
      description: How a learner activity was completed on the dashboard.
      type: string
      enum: [ scored, finished ]
    LearningStatusV1:
      description: Individual lesson learning status on the team dashboard.
      type: string
      enum: [ completed, in-progress ]

    ApiErrorV1:
      description: Standard API error payload.
      type: object
      additionalProperties: false
      required: [ code, message, timestamp ]
      properties:
        code:
          description: Machine-readable code value.
          type: string
        message:
          description: Human-readable message text.
          type: string
        timestamp:
          description: Timestamp for the event or error.
          type: string
          format: date-time
        correlationId:
          description: Correlation identifier for tracing.
          type: string
        parameters:
          description: Parameters for Api Error.
          type: array
          items: { $ref: '#/components/schemas/ValidationParameterV1' }
    ValidationParameterV1:
      description: Single validation parameter attached to an API error.
      type: object
      additionalProperties: false
      required: [ code, value ]
      properties:
        code:
          description: Machine-readable code value.
          type: string
        value:
          description: Parameter value.
          type: string
    UserV1:
      description: Authenticated user identity from Clerk JWT claims.
      type: object
      additionalProperties: false
      required: [ userId, email ]
      properties:
        userId:
          description: User identifier.
          type: string
        email:
          description: Email address.
          type: string
          format: email
        fullName:
          description: Full display name.
          type: string
    UserSummaryV1:
      description: Compact user profile shown in team and assignment views.
      type: object
      additionalProperties: false
      required: [ id, email, role ]
      properties:
        id:
          description: Unique identifier.
          type: integer
          format: int64
        name:
          description: Display name.
          type: string
        email:
          description: Email address.
          type: string
          format: email
        role:
          description: Role code for the user or member.
          allOf:
            - $ref: '#/components/schemas/UserRoleCodeV1'
        position:
          description: Job position or title.
          type: string
        avatarStorageKey:
          description: Storage key for the user's avatar image.
          type: string
        avatarColor:
          description: Fallback avatar color when no image is set.
          type: string
        gradeId:
          description: Current grade identifier, when a grade has been assigned.
          type: integer
          format: int64
          nullable: true
        gradeCode:
          description: Current grade's stable code, when a grade has been assigned.
          type: string
          nullable: true
        gradeName:
          description: Current grade's display name, when a grade has been assigned.
          type: string
          nullable: true
    UserProfileV1:
      description: User profile wrapper containing the current user summary.
      type: object
      additionalProperties: false
      required: [ user ]
      properties:
        user:
          description: Nested user payload.
          allOf:
            - $ref: '#/components/schemas/UserSummaryV1'
    UpdateProfileRequestV1:
      description: Fields for updating the signed-in user's profile.
      type: object
      additionalProperties: false
      properties:
        name:
          description: Display name.
          type: string
        position:
          description: Job position or title.
          type: string
        avatarStorageKey:
          description: Storage key for the user's avatar image.
          type: string
        avatarColor:
          description: Fallback avatar color when no image is set.
          type: string
    AvatarUploadFormV1:
      description: Multipart form for uploading a profile avatar image.
      type: object
      additionalProperties: false
      required: [ file ]
      properties:
        file:
          description: Binary file content.
          type: string
          format: binary
    MaterialFileUploadFormV1:
      description: Multipart form for uploading a material attachment.
      type: object
      additionalProperties: false
      required: [ file ]
      properties:
        file:
          description: Binary file content.
          type: string
          format: binary
    LessonFileUploadFormV1:
      description: Lesson File Upload Form payload.
      type: object
      additionalProperties: false
      required: [ file ]
      properties:
        file:
          description: Binary file content.
          type: string
          format: binary
    AvatarUploadResponseV1:
      description: Avatar Upload Response payload.
      type: object
      additionalProperties: false
      required: [ storageKey ]
      properties:
        storageKey:
          description: Object storage key for an uploaded file.
          type: string
    OkResponseV1:
      description: Ok Response payload.
      type: object
      additionalProperties: false
      required: [ ok ]
      properties:
        ok:
          description: Indicates whether the operation succeeded.
          type: boolean
    OkIdResponseV1:
      description: Ok Id Response payload.
      type: object
      additionalProperties: false
      required: [ ok, id ]
      properties:
        ok:
          description: Indicates whether the operation succeeded.
          type: boolean
        id:
          description: Unique identifier.
          type: integer
          format: int64
    PermissionDefinitionV1:
      description: Permission Definition payload.
      type: string
      enum:
        - admin.manage_roles
        - permissions.manage_teamleads
        - permissions.manage_team_members
        - teams.manage_members
        - groups.manage
        - grades.manage
        - materials.create
        - materials.edit
        - materials.delete
        - lessons.create
        - lessons.manage
        - lessons.publish_archive
        - lessons.manage_activities
        - lessons.manage_assets
        - roadmaps.create
        - roadmaps.manage
        - learning.enroll
        - learning.assign
        - learning.complete
        - learning.ask
    PermissionDefinitionMetaV1:
      description: Permission definition with display metadata.
      type: object
      additionalProperties: false
      required: [ code, label, group ]
      properties:
        code:
          description: Permission code.
          allOf:
            - $ref: '#/components/schemas/PermissionDefinitionV1'
        label:
          description: Display label.
          type: string
        description:
          description: Optional longer description.
          type: string
        group:
          description: Display group name.
          type: string
    PermissionMapV1:
      description: Permission Map payload.
      type: object
      additionalProperties: { type: boolean }
    UserPermissionSnapshotV1:
      description: User Permission Snapshot payload.
      type: object
      additionalProperties: false
      required: [ roleCode, effective, overrides ]
      properties:
        roleCode:
          description: Role Code for User Permission Snapshot.
          allOf:
            - $ref: '#/components/schemas/UserRoleCodeV1'
        effective:
          description: Effective permission map.
          allOf:
            - $ref: '#/components/schemas/PermissionMapV1'
        overrides:
          description: Permission override map keyed by permission code.
          allOf:
            - $ref: '#/components/schemas/PermissionMapV1'
    CurrentUserPermissionsResponseV1:
      description: Current-user Permissions Response payload.
      type: object
      additionalProperties: false
      required: [ permissions ]
      properties:
        permissions:
          description: Effective and override permission flags for the authenticated caller.
          allOf:
            - $ref: '#/components/schemas/UserPermissionSnapshotV1'
    PermissionSnapshotResponseV1:
      description: Permission Snapshot Response payload.
      type: object
      additionalProperties: false
      required: [ permissionDefinitions, permissionsByUserId, users ]
      properties:
        permissionDefinitions:
          description: Permission Definitions for Permission Snapshot Response.
          type: array
          items: { $ref: '#/components/schemas/PermissionDefinitionMetaV1' }
        permissionsByUserId:
          description: Permissions By User Id for Permission Snapshot Response.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UserPermissionSnapshotV1'
        users:
          description: Summaries of every user included in permissionsByUserId, scoped to what the viewer may manage (self only, an owned team's members, or everyone for admins).
          type: array
          items: { $ref: '#/components/schemas/UserSummaryV1' }
    SetPermissionOverridesRequestV1:
      description: Set Permission Overrides Request payload.
      type: object
      additionalProperties: false
      required: [ userId, overrides ]
      properties:
        userId:
          description: User identifier.
          type: integer
          format: int64
        overrides:
          description: Permission override map keyed by permission code.
          allOf:
            - $ref: '#/components/schemas/PermissionMapV1'
    SetPermissionOverridesResponseV1:
      description: Set Permission Overrides Response payload.
      type: object
      additionalProperties: false
      required: [ permissions ]
      properties:
        permissions:
          description: Permission flags keyed by permission code.
          allOf:
            - $ref: '#/components/schemas/UserPermissionSnapshotV1'
    AdminUsersListResponseV1:
      description: Admin Users List Response payload.
      type: object
      additionalProperties: false
      required: [ users, page ]
      properties:
        users:
          description: One page of users in the workspace with their current role.
          type: array
          items: { $ref: '#/components/schemas/UserSummaryV1' }
        page:
          description: Pagination metadata for the users collection.
          allOf:
            - $ref: '#/components/schemas/PageInfoV1'
    AdminUserStatsV1:
      description: Workspace-wide user/admin/team-lead counts, independent of the current search/filter/page.
      type: object
      additionalProperties: false
      required: [ totalUsers, totalAdmins, totalTeamLeads, totalPermissionsEnabled ]
      properties:
        totalUsers:
          description: Total number of users in the workspace.
          type: integer
          format: int32
        totalAdmins:
          description: Number of users with the admin role.
          type: integer
          format: int32
        totalTeamLeads:
          description: Number of users with the team lead role.
          type: integer
          format: int32
        totalPermissionsEnabled:
          description: Total number of enabled effective permission flags across every team lead.
          type: integer
          format: int32
    AdminUserStatsResponseV1:
      description: Admin User Stats Response payload.
      type: object
      additionalProperties: false
      required: [ stats ]
      properties:
        stats:
          description: The aggregate counts.
          allOf:
            - $ref: '#/components/schemas/AdminUserStatsV1'
    AssignUserRoleRequestV1:
      description: Assign User Role Request payload.
      type: object
      additionalProperties: false
      required: [ roleCode ]
      properties:
        roleCode:
          description: Target role for the user.
          allOf:
            - $ref: '#/components/schemas/UserRoleCodeV1'
    TeamLeadEmailRequestV1:
      description: Team Lead Email Request payload.
      type: object
      additionalProperties: false
      required: [ email ]
      properties:
        email:
          description: Email address.
          type: string
          format: email
    TeamV1:
      description: Team payload.
      type: object
      additionalProperties: false
      required: [ members ]
      properties:
        lead:
          description: Lead for Team.
          allOf:
            - { $ref: '#/components/schemas/UserSummaryV1' }
          nullable: true
        members:
